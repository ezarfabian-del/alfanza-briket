<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Fanza Briquette | Official Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* Efek Api Tetap Ada */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 8%; position: fixed; width: 100%; z-index: 100;
            background: rgba(0,0,0,0.9); border-bottom: 1px solid #d4af37;
        }
        .logo-circle { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #d4af37; object-fit: cover; }

        .hero {
            height: 80vh; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('bara.jpeg');
            background-size: cover; background-position: center; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
            position: relative; z-index: 2;
        }
        .hero h1 { font-size: 3.5rem; color: #d4af37; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }

        .container { padding: 60px 8%; position: relative; z-index: 2; }
        
        /* Bagian Foto Produk (Gallery) */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; }
        .card-info h3 { color: #d4af37; margin-bottom: 5px; }

        /* Bagian Harga */
        .price-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 40px; }
        .price-card {
            background: rgba(212, 175, 55, 0.05); padding: 25px; border-radius: 12px;
            text-align: center; border: 1px solid #d4af37; text-decoration: none; color: inherit; transition: 0.3s;
        }
        .price-card:hover { background: rgba(212, 175, 55, 0.2); transform: translateY(-5px); }
        .amount { font-size: 1.5rem; font-weight: bold; display: block; margin: 10px 0; color: #d4af37; }

        .wa-float {
            position: fixed; bottom: 20px; right: 20px; background: #25d366;
            color: white; padding: 12px 20px; border-radius: 30px; text-decoration: none;
            font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <canvas id="fire"></canvas>
    <header>
        <img src="logo.jpeg" class="logo-circle" alt="Logo">
        <div style="color: #d4af37; font-weight: bold; letter-spacing: 2px;">AL-FANZA</div>
    </header>

    <a href="https://wa.me/6282323845080" class="wa-float" target="_blank">Chat Admin WA</a>

    <section class="hero">
        <h1>AL-FANZA BRIQUETTE</h1>
        <p style="color: #ccc;">Premium Charcoal for Shisha & BBQ</p>
    </section>

    <section class="container">
        <h2 style="text-align: center; color: #d4af37; margin-bottom: 30px;">GALERI PRODUK</h2>
        <div class="grid">
            <div class="card">
                <img src="bara-shisha.jpeg" alt="Shisha">
                <div class="card-info"><h3>Premium Shisha</h3></div>
            </div>
            <div class="card">
                <img src="produk-studio.jpeg" alt="Studio">
                <div class="card-info"><h3>Export Quality</h3></div>
            </div>
            <div class="card">
                <img src="produk.jpeg" alt="Produk">
                <div class="card-info"><h3>Bara Stabil</h3></div>
            </div>
        </div>

        <h2 style="text-align: center; color: #d4af37; margin-top: 60px; margin-bottom: 30px;">DAFTAR HARGA</h2>
        <div class="price-grid">
            <a href="https://wa.me/6282323845080?text=Order%201KG" class="price-card">
                <h4>1 KG</h4>
                <span class="amount">Rp 15.000</span>
                <small>Klik untuk Pesan</small>
            </a>
            <a href="https://wa.me/6282323845080?text=Order%205KG" class="price-card">
                <h4>5 KG</h4>
                <span class="amount">Rp 68.000</span>
                <small>Klik untuk Pesan</small>
            </a>
            <a href="https://wa.me/6282323845080?text=Order%2010KG" class="price-card">
                <h4>10 KG</h4>
                <span class="amount">Rp 130.000</span>
                <small>Klik untuk Pesan</small>
            </a>
        </div>
    </section>

    <script>
        const canvas = document.getElementById('fire');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * 2 + 1;
                this.opacity = 1;
            }
            update() { this.y -= this.speedY; if (this.opacity > 0) this.opacity -= 0.005; }
            draw() {
                ctx.fillStyle = rgba(255, 100, 0, ${this.opacity});
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (particles.length < 50) particles.push(new Particle());
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                if (particles[i].opacity <= 0) { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
