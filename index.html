<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Fanza Briquette | Premium Quality</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #030303; color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        
        /* Kanvas Efek Api */
        #fire-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        header { 
            display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; 
            position: fixed; width: 100%; z-index: 100; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid #d4af37;
        }
        .logo-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #d4af37; object-fit: cover; }

        .hero {
            height: 100vh; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), url('bara.jpeg');
            background-size: cover; background-position: center; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
            position: relative; z-index: 2;
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 4rem; color: #d4af37; text-shadow: 0 0 20px rgba(212,175,55,0.5); }

        .container { padding: 80px 8%; position: relative; z-index: 2; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: #0a0a0a; border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.5s; }
        .card:hover { border-color: #d4af37; transform: translateY(-10px); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .info { padding: 20px; text-align: center; color: #d4af37; font-weight: 600; }

        .wa-float {
            position: fixed; bottom: 30px; right: 30px; background: #25d366;
            color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none;
            font-weight: bold; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <canvas id="fire-canvas"></canvas>
    <header>
        <div style="display:flex; align-items:center; gap:15px;">
            <img src="logo.jpeg" class="logo-img">
            <h2 style="color:#d4af37; font-family:'Playfair Display'">AL-FANZA</h2>
        </div>
    </header>

    <section class="hero">
        <h1>THE HOTTEST ENERGY</h1>
        <p>Briket Arang Premium Kualitas Ekspor</p>
    </section>

    <section class="container">
        <h2 style="text-align:center; color:#d4af37; margin-bottom:40px; font-family:'Playfair Display'; font-size:2.5rem;">Koleksi Produk</h2>
        <div class="grid">
            <div class="card"><img src="bara-shisha.jpeg"><div class="info">Premium Shisha</div></div>
            <div class="card"><img src="produk-studio.jpeg"><div class="info">Export Quality</div></div>
            <div class="card"><img src="bara-1.jpeg"><div class="info">Natural Wood</div></div>
            <div class="card"><img src="bara-2.jpeg"><div class="info">High Heat</div></div>
            <div class="card"><img src="produk.jpeg"><div class="info">Long Lasting</div></div>
            <div class="card"><img src="detail.jpeg"><div class="info">Fine Texture</div></div>
        </div>
    </section>

    <a href="https://wa.me/6282323845080" class="wa-float" target="_blank">Order via WhatsApp</a>

    <script>
        const canvas = document.getElementById('fire-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.opacity = 1;
            }
            update() { this.y -= this.speedY; this.opacity -= 0.005; }
            draw() {
                ctx.fillStyle = rgba(255, 120, 0, ${this.opacity});
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (particles.length < 70) particles.push(new Particle());
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                if (particles[i].opacity <= 0) { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
